name: Runner Test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Check repository files
        run: ls -la

      - name: Check Terraform version
        run: terraform --version || echo "Terraform not found on VM"
